name: K8s Dashboard Docker Image CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::6}" >> $GITHUB_ENV

      - name: Build and push Dashboard image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/k8s-dashboard:${{ env.SHORT_SHA }}
            ${{ secrets.DOCKER_USERNAME }}/k8s-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Steampipe image
        uses: docker/build-push-action@v6
        with:
          context: ./deploy
          file: ./deploy/steampipe.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/steampipe-k8s:${{ env.SHORT_SHA }}
            ${{ secrets.DOCKER_USERNAME }}/steampipe-k8s:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Checkout 'montstrap-manifest' repository
        if: success()
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/montstrap-manifest
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          path: montstrap-manifest

      - name: Update manifest files with new image tag
        if: success()
        run: |
          cd montstrap-manifest
          sed -i 's|image:.*k8s-dashboard.*|image: ${{ secrets.DOCKER_USERNAME }}/k8s-dashboard:${{ env.SHORT_SHA }}|' prod/k8s-dashboard/manifests/deployment.yaml
          sed -i 's|image:.*k8s-dashboard.*|image: ${{ secrets.DOCKER_USERNAME }}/k8s-dashboard:${{ env.SHORT_SHA }}|' stage/k8s-dashboard/manifests/deployment.yaml
          sed -i 's|image:.*steampipe.*|image: ${{ secrets.DOCKER_USERNAME }}/steampipe-k8s:${{ env.SHORT_SHA }}|' prod/k8s-dashboard/manifests/deployment.yaml
          sed -i 's|image:.*steampipe.*|image: ${{ secrets.DOCKER_USERNAME }}/steampipe-k8s:${{ env.SHORT_SHA }}|' stage/k8s-dashboard/manifests/deployment.yaml

      - name: Commit and push changes to 'montstrap-manifest'
        if: success()
        run: |
          cd montstrap-manifest
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add prod/k8s-dashboard/manifests/deployment.yaml
          git add stage/k8s-dashboard/manifests/deployment.yaml
          git diff --cached --quiet || git commit -m "Update k8s-dashboard image tag to ${{ env.SHORT_SHA }}"
          git push
